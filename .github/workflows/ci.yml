name: CI

on:
  push:
    branches:
      - master
  pull_request:
  merge_group:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GOWORK: "off"

jobs:
  unit:
    name: Unit, race, vet, and build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Set up just
        uses: extractions/setup-just@53165ef7e734c5c07cb06b3c8e7b647c5aa16db3 # v4
        with:
          just-version: "1.57.0"

      - name: Check formatting
        shell: bash
        run: |
          unformatted="$(gofmt -l .)"
          if [[ -n "$unformatted" ]]; then
            echo "The following Go files need formatting:"
            echo "$unformatted"
            exit 1
          fi

      - name: Check module files
        run: |
          go mod tidy
          git diff --exit-code -- go.mod go.sum

      - name: Build all packages
        run: go build ./...

      - name: Run unit tests
        run: just test

      - name: Run race detector
        run: go test -race -covermode=atomic -coverprofile=coverage.out ./...

      - name: Upload coverage profile
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: unit-coverage
          path: coverage.out
          if-no-files-found: error
          retention-days: 7

      - name: Run go vet
        run: just vet

  lint:
    name: golangci-lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Set up just
        uses: extractions/setup-just@53165ef7e734c5c07cb06b3c8e7b647c5aa16db3 # v4
        with:
          just-version: "1.57.0"

      - name: Run golangci-lint
        run: just lint

  generated:
    name: Generated code is current
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Set up just
        uses: extractions/setup-just@53165ef7e734c5c07cb06b3c8e7b647c5aa16db3 # v4
        with:
          just-version: "1.57.0"

      - name: Regenerate checked-in code
        run: just generate-example

      - name: Check for generated-code drift
        shell: bash
        run: |
          git diff --exit-code -- . ':(exclude)bin/sqlc-gen-store'
          untracked="$(git ls-files --others --exclude-standard)"
          if [[ -n "$untracked" ]]; then
            echo "Generation produced untracked files:"
            echo "$untracked"
            exit 1
          fi

  vulnerability:
    name: Vulnerability scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Run govulncheck
        uses: golang/govulncheck-action@032d45514ae346b1db93c04b0c90b841c370344f # v1.1.0
        with:
          go-version-input: "1.26.5"
          go-package: ./...
          cache-dependency-path: go.sum

  integration:
    name: PostgreSQL integration and examples
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Set up just
        uses: extractions/setup-just@53165ef7e734c5c07cb06b3c8e7b647c5aa16db3 # v4
        with:
          just-version: "1.57.0"

      - name: Start PostgreSQL topology
        run: just integration-up

      - name: Run integration tests
        run: just integration-test

      - name: Run example smoke tests
        run: just examples-smoke

      - name: Collect Docker logs
        if: failure()
        run: docker compose -p pgmesh-integration -f integration/docker-compose.yaml logs --no-color > integration-logs.txt

      - name: Upload Docker logs
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: integration-docker-logs
          path: integration-logs.txt
          if-no-files-found: ignore
          retention-days: 7

      - name: Stop PostgreSQL topology
        if: always()
        run: just integration-down
