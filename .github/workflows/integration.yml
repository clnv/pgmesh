name: Integration

on:
  push:
    branches:
      - master
  pull_request:
  merge_group:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: integration-${{ github.ref }}
  cancel-in-progress: true

jobs:
  integration:
    name: PostgreSQL integration and examples
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Set up just
        uses: extractions/setup-just@53165ef7e734c5c07cb06b3c8e7b647c5aa16db3 # v4
        with:
          just-version: "1.57.0"

      - name: Start PostgreSQL topology
        run: just integration-up

      - name: Run integration tests
        run: just integration-test

      - name: Run example smoke tests
        run: just examples-smoke

      - name: Collect Docker logs
        if: failure()
        run: docker compose -p pgmesh-integration -f integration/docker-compose.yaml logs --no-color > integration-logs.txt

      - name: Upload Docker logs
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: integration-docker-logs
          path: integration-logs.txt
          if-no-files-found: ignore
          retention-days: 7

      - name: Stop PostgreSQL topology
        if: always()
        run: just integration-down
