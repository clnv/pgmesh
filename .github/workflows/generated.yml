name: Generated

on:
  push:
    branches:
      - master
  pull_request:
  merge_group:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: generated-${{ github.ref }}
  cancel-in-progress: true

jobs:
  generated:
    name: Generated code is current
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Set up just
        uses: extractions/setup-just@53165ef7e734c5c07cb06b3c8e7b647c5aa16db3 # v4
        with:
          just-version: "1.57.0"

      - name: Regenerate checked-in code
        run: just generate-example

      - name: Check for generated-code drift
        shell: bash
        run: |
          git diff --exit-code -- . ':(exclude)bin/sqlc-gen-store'
          untracked="$(git ls-files --others --exclude-standard)"
          if [[ -n "$untracked" ]]; then
            echo "Generation produced untracked files:"
            echo "$untracked"
            exit 1
          fi
